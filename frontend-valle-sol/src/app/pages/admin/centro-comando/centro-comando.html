<main class="fade-in">
    <div class="map-wrapper-tactical">

        <div id="infoMap" class="map-layer"></div>

        <div class="floating-panel-right">
            <h2
                style="color: #22d3ee; font-weight: 800; font-size: 1.3rem; margin: 0 0 20px 0; text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);">
                Información Relevante</h2>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                <div
                    style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border: 1px solid rgba(6, 182, 212, 0.2); text-align: center; border-left: 3px solid #ef4444;">
                    <span style="display: block; font-size: 1.8rem; font-weight: 900; color: #fff;">12</span>
                    <span
                        style="font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: bold;">Incidencias
                        Totales</span>
                </div>
                <div
                    style="background: rgba(0,0,0,0.5); padding: 15px; border-radius: 12px; border: 1px solid rgba(6, 182, 212, 0.2); text-align: center; border-left: 3px solid #10b981;">
                    <span style="display: block; font-size: 1.8rem; font-weight: 900; color: #fff;">450</span>
                    <span
                        style="font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; font-weight: bold;">Hectáreas
                        Salvas</span>
                </div>
            </div>

            <h3
                style="font-size: 0.75rem; font-weight: bold; color: #67e8f9; text-transform: uppercase; border-bottom: 1px solid rgba(34, 211, 238, 0.2); padding-bottom: 8px; margin-bottom: 15px;">
                Historial de Catástrofes
            </h3>

            <div class="scroll-dark"
                style="flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 10px;">
                <div *ngFor="let m of mockHistorial"
                    style="display: flex; gap: 15px; align-items: center; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05);">
                    <div
                        style="width: 40px; height: 40px; border-radius: 50%; background: #0f172a; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);">
                        {{ m.emoji }}
                    </div>
                    <div>
                        <h4 style="margin: 0 0 3px 0; font-size: 0.9rem; color: #f8fafc; font-weight: 700;">{{ m.tipo }}
                        </h4>
                        <p style="margin: 0; font-size: 0.75rem; color: #94a3b8;">{{ m.dir }}</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>
