# Perfil de pruebas: base de datos H2 en memoria (modo PostgreSQL).
# Permite ejecutar pruebas de integracion sin depender de un PostgreSQL real.
spring.datasource.url=jdbc:h2:mem:reportes_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
