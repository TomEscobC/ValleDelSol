spring.application.name=ms-reportes-ciudadano
server.port=8081

# --- PostgreSQL (configurable por variables de entorno para Docker) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/db_incendios_forestales}
spring.datasource.username=${DB_USER:admin_vallesol}
spring.datasource.password=${DB_PASSWORD:SecurePass2026!}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Actuator para chequeo de salud
management.endpoints.web.exposure.include=health,info
