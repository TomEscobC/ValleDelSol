spring.application.name=bff-valle-sol
server.port=8080

# URLs de los microservicios (configurables por variables de entorno para Docker)
services.reportes.url=${SERVICE_REPORTES_URL:http://localhost:8081}
services.alertas.url=${SERVICE_ALERTAS_URL:http://localhost:8082}

# Origen permitido para CORS (frontend Angular)
frontend.origen=${FRONTEND_ORIGEN:http://localhost:4200}

management.endpoints.web.exposure.include=health,info
